name: ReaPack Tag Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate index XML and tag pinning
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET

          tag = os.environ["TAG_NAME"]
          expected_version = tag[1:] if tag.startswith("v") else tag

          tree = ET.parse("index.xml")
          root = tree.getroot()

          versions = [v.attrib.get("name", "") for v in root.findall(".//version")]
          if expected_version not in versions:
              print(f"Expected version '{expected_version}' not found in index.xml versions: {versions}")
              sys.exit(1)

          bad_sources = []
          for src in root.findall(".//source"):
              url = (src.text or "").strip()
              if not url:
                  continue
              if f"/{tag}/" not in url:
                  bad_sources.append(url)

          if bad_sources:
              print(f"Found {len(bad_sources)} source URLs not pinned to tag '{tag}':")
              for url in bad_sources[:20]:
                  print(f" - {url}")
              sys.exit(1)

          print(f"✓ Version {expected_version} found")
          print(f"✓ All {len([s for s in root.findall('.//source')]))} sources pinned to {tag}")
          PY

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
